version: '3.8'

services:
  feedfox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedfox
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/dev.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-here}
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      - feedfox_data:/app/prisma
      - ./data:/app/data

volumes:
  feedfox_data:
