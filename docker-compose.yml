version: '3.8'

services:
  feedfox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedfox
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-here}
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://feedfox.wollank.cloud
    volumes:
      - feedfox_db_data:/app/data

volumes:
  feedfox_db_data:
