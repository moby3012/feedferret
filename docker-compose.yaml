services:
  feedferret:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
        DATABASE_URL: ${DATABASE_URL:-postgresql://feedferret:feedferret-change-me@postgres:5432/feedferret?schema=public}
    container_name: feedferret
    restart: always
    # Note: when deploying under Coolify (or any reverse-proxy platform that
    # injects its own network), do NOT define a custom 'networks:' block here.
    # Compose creates a default project network automatically, and the proxy
    # platform attaches its own network on top so Traefik can route traffic.
    # Hardcoding a custom bridge network isolates the container from Traefik
    # and produces Gateway Timeout errors at the public URL.
    ports:
      - "3000:3000"
    environment:
      - DATABASE_PROVIDER=${DATABASE_PROVIDER:-postgresql}
      - DATABASE_URL=${DATABASE_URL:-postgresql://feedferret:feedferret-change-me@postgres:5432/feedferret?schema=public}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-feedferret-change-me}
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-here}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - AUTH_URL=${AUTH_URL:-https://feedferret.example.com}
      - PORT=${PORT:-3000}
      # Example OAuth Providers (Uncomment and set values to enable)
      # - GOOGLE_CLIENT_ID=your-google-id
      # - GOOGLE_CLIENT_SECRET=your-google-secret
      # - GITHUB_ID=your-github-id
      # - GITHUB_SECRET=your-github-secret
      # Browser-render sidecar (M7-T2) — wired up by default against the
      # 'render-sidecar' service below, for JS-heavy/client-only pages that
      # in-process fetching can't extract. Used only as a fallback; leave
      # FEEDFERRET_RENDER_SIDECAR_URL unset (or comment it out) to disable.
      - FEEDFERRET_RENDER_SIDECAR_URL=${FEEDFERRET_RENDER_SIDECAR_URL:-http://render-sidecar:8080/}
      - FEEDFERRET_RENDER_SIDECAR_TOKEN=${RENDER_SIDECAR_TOKEN:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      # No 'render-sidecar' dependency here on purpose: FeedFerret must start
      # and work fully even if the sidecar is still building, crashed, or
      # removed — every call site already falls back gracefully when it's
      # unreachable (see lib/render-sidecar.ts).
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Browser-render sidecar (M7-T2, docs/render-sidecar.md): renders JS-heavy /
  # client-only pages in a real headless Chromium for the full-text and
  # page→feed builder fallback paths. Runs isolated: no published ports (only
  # 'feedferret' reaches it on the internal Compose network), non-root,
  # no-new-privileges. To disable it entirely, remove this service AND the
  # FEEDFERRET_RENDER_SIDECAR_URL line above.
  render-sidecar:
    build: ./docker/render-sidecar
    container_name: feedferret-render-sidecar
    restart: unless-stopped
    environment:
      - SIDECAR_TOKEN=${RENDER_SIDECAR_TOKEN:-change-me}
    expose:
      - "8080"
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    container_name: feedferret-postgres
    restart: unless-stopped
    # Port 5432 is exposed to the host for maintenance access (e.g. pg_dump, psql).
    # For public-facing servers, remove or comment out this 'ports' entry —
    # the app communicates with Postgres over the internal Docker network.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-feedferret}
      - POSTGRES_USER=${POSTGRES_USER:-feedferret}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-feedferret-change-me}
    volumes:
      - feedferret_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  feedferret_postgres_data:
  # Uncomment when using SQLite (DATABASE_PROVIDER=sqlite):
  # feedferret_db_data:
