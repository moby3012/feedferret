networks:
  feedferret_net:
    driver: bridge

services:
  feedferret:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
        DATABASE_URL: ${DATABASE_URL:-postgresql://feedferret:feedferret-change-me@postgres:5432/feedferret?schema=public}
    container_name: feedferret
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_PROVIDER=${DATABASE_PROVIDER:-postgresql}
      - DATABASE_URL=${DATABASE_URL:-postgresql://feedferret:feedferret-change-me@postgres:5432/feedferret?schema=public}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-feedferret-change-me}
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-here}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - AUTH_URL=${AUTH_URL:-https://feedferret.example.com}
      - PORT=${PORT:-3000}
      # Example OAuth Providers (Uncomment and set values to enable)
      # - GOOGLE_CLIENT_ID=your-google-id
      # - GOOGLE_CLIENT_SECRET=your-google-secret
      # - GITHUB_ID=your-github-id
      # - GITHUB_SECRET=your-github-secret
    networks:
      - feedferret_net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: feedferret-postgres
    restart: unless-stopped
    # Port 5432 is exposed to the host for maintenance access (e.g. pg_dump, psql).
    # For public-facing servers, remove or comment out this 'ports' entry —
    # the app communicates with Postgres over the internal Docker network.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-feedferret}
      - POSTGRES_USER=${POSTGRES_USER:-feedferret}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-feedferret-change-me}
    networks:
      - feedferret_net
    volumes:
      - feedferret_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  feedferret_postgres_data:
  # Uncomment when using SQLite (DATABASE_PROVIDER=sqlite):
  # feedferret_db_data:
