# Example: run FeedFerret's browser-render sidecar (M7-T2) next to FeedFerret.
#
# NOTE: the repo's top-level docker-compose.yaml already includes this service
# by default (shared RENDER_SIDECAR_TOKEN, feedferret pre-wired to it via
# FEEDFERRET_RENDER_SIDECAR_URL) — a plain `docker compose up -d` from the repo
# root already gives you a working sidecar. This file is for a STANDALONE setup
# instead: your own compose file, a different host/network, or testing outside
# this repo's compose stack.
#
# Add this `render-sidecar` service to your compose file (or merge the block)
# so both containers share a network and FeedFerret can reach the sidecar at
# http://render-sidecar:8080/.
#
# After it's up: Server Management → Sync → Browser-render sidecar
#   • enable it
#   • URL:   http://render-sidecar:8080/
#   • Token: the value of SIDECAR_TOKEN below (or leave both blank)
#   • click Test — a green result means it's wired up.
#   (Only takes effect if FEEDFERRET_RENDER_SIDECAR_URL is NOT set via ENV —
#   ENV always wins over this admin-UI config.)

services:
  render-sidecar:
    build: ./docker/render-sidecar
    # Or pin your own pre-built image instead of building:
    # image: your-registry/feedferret-render-sidecar:latest
    restart: unless-stopped
    environment:
      # Optional shared secret. If set, put the SAME value in the admin UI.
      SIDECAR_TOKEN: "change-me"
      # Pinned explicitly: some deploy platforms inject a PORT variable at the
      # project level across every service in a compose stack, which would
      # otherwise make this container listen on the wrong port. This service
      # reads SIDECAR_PORT specifically so that can't happen.
      SIDECAR_PORT: "8080"
      # NAV_TIMEOUT_MS: "30000"
    # No published ports needed — only FeedFerret talks to it, over the
    # internal network. Keep it off the public internet.
    expose:
      - "8080"
    # Renders untrusted pages: keep it isolated (no volumes, no extra caps).
    security_opt:
      - no-new-privileges:true
