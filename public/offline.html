<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1b23" />
    <title>FeedFerret Offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11131a;
        color: #f5f6fb;
      }
      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 2rem;
        padding: 2rem;
        background: rgba(255,255,255,.06);
        box-shadow: 0 1.5rem 4rem rgba(0,0,0,.25);
      }
      img { width: 3rem; height: 3rem; filter: invert(1); }
      h1 { margin: 1.25rem 0 .5rem; font-size: 1.6rem; letter-spacing: -.04em; }
      p { margin: 0; color: rgba(245,246,251,.72); line-height: 1.6; }
      button {
        margin-top: 1.5rem;
        width: 100%;
        min-height: 3rem;
        border: 0;
        border-radius: 1rem;
        font: inherit;
        font-weight: 700;
        color: #11131a;
        background: #f5f6fb;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/logo.svg" alt="" />
      <h1>You are offline</h1>
      <p>FeedFerret is installed, but this page needs a connection. Reconnect and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
