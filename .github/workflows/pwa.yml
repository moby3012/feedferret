name: PWA

on:
  pull_request:
  push:
    branches:
      - main
      - feat/notifications-freshrss-opml

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.8
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run pwa:check
      - run: pnpm run build
        env:
          DATABASE_URL: file:./dev.db
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
      - run: pnpm exec next start -p 3000 > /tmp/feedferret.log 2>&1 &
        env:
          DATABASE_URL: file:./dev.db
          NEXTAUTH_SECRET: ci-secret
          NEXTAUTH_URL: http://localhost:3000
      - run: pnpm dlx wait-on http://localhost:3000/login
      - run: pnpm dlx @lhci/cli@0.15.1 autorun --collect.url=http://localhost:3000/login --upload.target=temporary-public-storage
