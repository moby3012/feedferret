name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    name: Lint · Type-Check · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (advisory)
        # npm retired the legacy audit endpoint pnpm calls (HTTP 410), so this
        # can no longer hard-gate CI. Kept as advisory output; known transitive
        # CVEs are pinned via pnpm.overrides in package.json.
        run: pnpm audit --audit-level=high || true

      - name: Generate Prisma client
        run: pnpm run prisma:generate
        env:
          DATABASE_PROVIDER: sqlite
          DATABASE_URL: file:./dev.db

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: pnpm run test

      - name: Translations
        run: pnpm run translations:check

      - name: Build
        run: pnpm run build
        env:
          DATABASE_PROVIDER: sqlite
          DATABASE_URL: file:./dev.db
          AUTH_SECRET: ci-test-secret-minimum-32-chars-long
          AUTH_URL: http://localhost:3000
          NEXTAUTH_URL: http://localhost:3000
